<!-- Doctype tells the browser this is an HTML5 document -->
<!DOCTYPE html>
<!-- The html tag wraps the entire page -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title shown on browser tab -->
    <title>Quarks Casino Coin Flip</title>
    <!-- Add link to external CSS file -->
    <link rel="stylesheet" href="main.css">
    <!-- Add link to external JavaScript file -->
    <script src="code.js"></script>
</head>

<body>

    <!-- Header section -->
    <header>
        <h1>Quarks Casino Coin Flip</h1>
    </header>

    <!-- Navigation menu -->
    <nav>
        <h2>Menu</h2>

        <!-- Link to homepage -->
        <a href="./index.html">Home</a>
        <br>
        <!-- Link to boards page -->
        <a href="./boards.html">Boards</a>
        <br>
        <!-- Link to game page -->
        <a href="./game.html">Game</a>
        <br>
        <!-- Link to strings page -->
        <a href="./strings.html">The Vault</a>
        <br>
    </nav>

    <!-- Main page content -->
    <main>
        <h2>Choose Heads or Tails!</h2>
          <!-- Casino game image -->
        <img id="casinoImage" src="casino.png" width="600">
        <br>
        <br>
        <!-- Form used for player input -->
        <form onsubmit="return playCoinGame();">

            <!-- Label for text input -->
            <label for="guess">Enter heads or tails:</label>
            <br>
            <br>
            <!-- User input box -->
            <input type="text" id="guess" required>
            <br>
            <br>
            <!-- Submit button -->
            <input type="submit" value="Flip Coin">

        </form>

        <br>
        <!-- Displays game results -->
        <p id="gameResult"></p>
        <!-- Displays player message -->
        <p id="playerMessage"></p>
    </main>

</body>
</html>
