<!--Doctype this is the first tag on the page and it tells the browser what type of document it is-->
<!DOCTYPE html>
<!--the html tag goes next-->
<html lang="en">
<!-- head section contains settings and resources for the browser -->
<head>
    <!--the head section has info for the browser and search engines-->
    <meta charset="UTF-8">
    <!-- viewport meta tag makes the page scale correctly on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title sets the text shown in the browser tab -->
    <title>Oshay's CSC102 Homepage</title>
    <!--add link to the css file-->
    <link rel="stylesheet" href="main.css">
    <!-- import Orbitron from Google Fonts as the creative custom font element -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <!-- style block for movement-specific styles and button design -->
    <style>
        /* center the main content column on the page, independent of the floated menu - same pattern as game.html */
        main {
            /* matches the max-width used on game.html's main wrapper */
            max-width: 600px;
            /* auto left/right margin centers the block relative to the full page */
            margin: 0 auto;
            /* keeps content off the page edges */
            padding: 30px 20px;
        }
        /* apply the imported Orbitron sci-fi font to the main heading */
        h1 {
            font-family: 'Orbitron', sans-serif;
        }
        /* fix the meme image position so JavaScript can move it freely over the page */
        #memeImage {
            position: fixed;
            /* size increased from original 150px so it stands out more */
            width: 275px;
            /* button.js sets left and top on load so the image starts centered */
            /* keep the glowing border from main.css */
            border-radius: 15px;
            box-shadow: 0 0 15px #00ffcc;
            /* place image above all other content */
            z-index: 50;
        }
        /* center the button controls on the page */
        #controls {
            margin-top: 20px;
        }
        /* style the Start button with the cyan color from the site theme */
        #startBtn {
            background-color: #00ffcc;
            color: #101820;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        /* style the Stop button with a contrasting red color */
        #stopBtn {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        /* visually dim disabled buttons so the user knows they cannot be clicked */
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        /* style the area where status messages will appear */
        #statusMessage {
            margin-top: 12px;
            font-size: 18px;
            color: #00ffcc;
        }
        /* center the sound control buttons on the page, same as the meme controls */
        #soundControls {
            margin-top: 20px;
        }
        /* style the Play Sound button with the same cyan color as the Start button */
        #playSoundBtn {
            background-color: #00ffcc;
            color: #101820;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        /* style the Mute Sound button with the same red color as the Stop button */
        #muteSoundBtn {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        /* style the area where sound status messages will appear */
        #soundStatus {
            margin-top: 12px;
            font-size: 18px;
            color: #00ffcc;
        }
        /* reset the old float-offset margin now that the footer lives inside the centered main wrapper */
        footer {
            margin-right: 0;
        }
    </style>
</head>

<!-- the body section holds the text and images that we want to show to the user -->
<body>
    <!--this section holds the menu, pinned to the left of the page -->
    <header>
       <!--create a nav section to hold the menu -->
       <nav>
        <!-- Menu heading -->
        <h2>Menu</h2>
         <!-- link back to the home page -->
         <a href="index.html">Home</a>
         <br>
         <!-- link to the boards page -->
         <a href="boards.html">Boards</a>
         <br>
         <!-- link to the game page -->
         <a href="game.html">Game</a>
         <br>
         <!-- link to the strings page -->
         <a href="strings.html">The Vault</a>
         <br>
         <!-- link to the table page -->
         <a href="table.html">Table</a>
       </nav>
    </header>

    <!-- main element centers all primary page content relative to the full page, matching game.html -->
    <main>

    <!-- main heading displayed at the top of the page -->
    <h1>Welcome to my CSC102 Home Page</h1>

    <!-- paragraph holding the meme image that will be animated by button.js -->
    <p>
        <!-- img is the image tag; button.js will update its left and top to move it -->
        <img id="memeImage" src="meme.png">
    </p>

    <!-- div containing the Start and Stop control buttons -->
    <div id="controls">
        <!-- Start button: uses onclick to call startMoving from button.js, enabled by default -->
        <button id="startBtn" onclick="startMoving()">Start</button>
        <!-- Stop button: uses onclick to call stopMoving from button.js, disabled until Start is clicked -->
        <button id="stopBtn" onclick="stopMoving()" disabled>Stop</button>
    </div>

    <!-- div where status messages will be written using innerHTML -->
    <div id="statusMessage"></div>

    <!-- hidden audio element loaded with the NASA ISS background ambience track -->
    <!-- loop attribute makes the track repeat automatically once it finishes -->
    <audio id="bgAudio" src="us-lab-background.mp3" loop></audio>

    <!-- div containing the Play and Mute buttons for the background sound -->
    <div id="soundControls">
        <!-- heading that introduces the background sound as a creative element -->
        <h2>NASA ISS Background Sound</h2>
        <!-- Play button: uses onclick to call playSound from sound.js, enabled by default -->
        <button id="playSoundBtn" onclick="playSound()">Play Sound</button>
        <!-- Mute button: uses onclick to call stopSound from sound.js, disabled until Play is clicked -->
        <button id="muteSoundBtn" onclick="stopSound()" disabled>Mute Sound</button>
    </div>

    <!-- div where sound status messages will be written using innerHTML -->
    <div id="soundStatus"></div>

    <!-- footer section displays author and school contact information -->
    <footer>
        <!-- display the author's full name -->
        Oshay White
        <br>
        <!-- display the name of the school -->
        University of Advancing Technology
        <br>
        <!-- display the school street address -->
        2625 W. Baseline Road
        <br>
        <!-- display city, state, and zip code -->
        Tempe, AZ 85283-1056
        <br>
    </footer>

    </main>

    <!-- link to the external JavaScript file that contains the button functions -->
    <script src="button.js"></script>
    <!-- link to the external JavaScript file that contains the sound functions -->
    <script src="sound.js"></script>
</body>
</html>
